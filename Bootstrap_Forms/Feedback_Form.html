<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Feedback Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>

   <style>  
body{  
    background: linear-gradient(135deg,#cce5ff,#e6f7ff);  
    height:100vh;  
    display:flex;  
    justify-content:center;  
    align-items:center;  
}  
  
.card{  
    width:400px; 
    height: auto; 
    border: none;  
    border-radius:10px;  
    overflow:hidden; 

}  
  
.card-header{  
    background:#0d6efd;  
    color:rgb(255, 255, 255);  
    text-align:center;  
    padding:20px;  
}  
  
.card-body{  
    background:#ffffff;  
    padding:30px;  
}  
  
.form-control,  
.form-select{  
    border-radius:10px;  
}  
  
.form-control:focus,  
.form-select:focus{  
    box-shadow:0 0 8px rgba(13,110,253,.4);  
    border-color:#0d6efd;  
}  

.btn-success{  
    background:#198754 ;
    border-radius:30px;  
    padding:10px;  
    font-size:18px;  
    transition:.3s;  
}  
  
.btn-success:hover{  
    transform:scale(1.05); 
    background: #146c43; 
}  
  
label{  
    font-weight:600;  
}  

.form-check-input{
  opacity:1 !important;
  display: inline-block !important;
  visibility: visible !important;
}

</style>  

</head>


  <body>

    <div class="container mt-5">
      <div class="card shadow-lg;">
        <div class="card-header">
          <h3>Student Feedback Form</h3>
        </div>

        <div class="card-body">
          <form action="#" method="post">
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" placeholder="Enter Your Name">

            </div>

            <div class="mb-3">
              <label class="form-label">Email Address</label>
             <input type="email" class="form-control" placeholder="Enter Your email">

            </div>

            <div class="mb-3">
               <label class="form-label">Rate Our Service</label>
               <select class="form-select">
               <option selected="select-Rating"></option>
               <option>Excellent</option>
               <option>Very Good</option>
               <option>Good</option>
               <option>Average</option>
               <option>Poor</option>

               </select>

            </div>

            <div class="mb-3">
             <label class="form-label">Your Feedback</label> 
             <textarea class="form-control" rows="4" placeholder="Write your feedback here..."></textarea>

            </div>

            <div class="mb-3">
               <label class="form-label">Would you recommend us?</label> <br>

               <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="recommend" id="yes">
                <label class="form-check-label" for="yes">Yes</label> 
               </div>

                <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="recommend" id="no">
                <label class="form-check-label" for="no">No</label> 
               </div>

            </div>

            <button type="submit" class="btn btn-success w-100">Submit Feedback</button>
  

          </form>

        </div>

      </div>

    </div>



    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
