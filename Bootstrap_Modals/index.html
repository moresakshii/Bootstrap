<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>

      <!-- Button trigger modal -->
<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
  Sign Up
</button>

<!-- Modal -->
<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalLabel">Login Page</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">

    <style>
      body {
        background: linear-gradient(135deg, #667eea, #764ba2);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .login-card {
        width: 100%;
        max-width: 420px;
        border: none;
        border-radius: 20px;
        overflow: hidden;
        backdrop-filter: blur(10px);
      }
      .form-control {
        border-radius: 10px;
        padding: 12px;
      }
      .btn-login {
        border-radius: 10px;
        padding: 12px;
        font-weight: 600;
      }
      .logo {
        font-size: 3rem;
        color: #6f42c1;
      }
    </style>
  </head>
  <body>
    <div class="card shadow-lg login-card">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <i class="bi bi-person-circle logo"></i>
          <h2 class="fw-bold mt-2">Welcome Back</h2>
          <p class="text-muted">Sign in to your account</p>
        </div>
        <form>
          <!-- Email -->
          <div class="mb-3">
            <label class="form-label">Email Address</label>
            <div class="input-group">
              <span class="input-group-text">
                <i class="bi bi-envelope"></i>
              </span>
              <input
                type="email"
                class="form-control"
                placeholder="Enter your email"
                required
              />
            </div>
          </div>
          <!-- Password -->
          <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text"> <i class="bi bi-lock"></i> </span>
              <input
                type="password"
                class="form-control"
                placeholder="Enter your password"
                required
              />
            </div>
          </div>
          <!-- Remember Me -->
          <div class="d-flex justify-content-between mb-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="remember" />
              <label class="form-check-label" for="remember">
                Remember Me
              </label>
            </div>
            <a href="#" class="text-decoration-none"> Forgot Password? </a>
          </div>
          <!-- Login Button -->
          <button type="submit" class="btn btn-primary w-100 btn-login">
            Login
          </button>
          <!-- Divider -->
          <div class="text-center my-4 text-muted">OR</div>
          <!-- Social Login -->
          <div class="d-grid gap-2">
            <button type="button" class="btn btn-outline-danger">
              <i class="bi bi-google"></i> Continue with Google
            </button>
            <button type="button" class="btn btn-outline-dark">
              <i class="bi bi-github"></i> Continue with GitHub
            </button>
          </div>
          <p class="text-center mt-4 mb-0">
            Don't have an account?
            <a href="#" class="text-decoration-none fw-bold"> Register </a>
          </p>
        </form>
      </div>
    </div>
      
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary">Save changes</button>
      </div>
    </div>
  </div>
</div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
